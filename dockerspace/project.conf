#!/bin/bash
# project.conf — Docker config for the mypostgresql_db project.
# Sourced by start.sh, stop.sh, run_in_host.sh, and loginto_docker.sh.

PROJECT_NAME="mypostgresql_db"
IMAGE_NAME="mypostgresql_db-image"
IMAGE_VERSION="1.0"
CONTAINER_NAME="mypostgresql_db-container"
CONTAINER_WORKDIR="/mypostgresql_db"

REMOVE_IMAGE_ON_STOP=false
FORCE_RECREATE_CONTAINER=false

# ─── Port forwarding (run_in_host.sh) ─────────────────────────────────────────
EXPOSE_PORTS="8085:8085"
